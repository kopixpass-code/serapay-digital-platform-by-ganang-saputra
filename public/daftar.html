<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">

  <title>Daftar Akun • Serapay</title>
  	<link rel="icon" href="/img/favicon.png" sizes="32x32">
    <link rel="icon" href="/img/favicon.png" sizes="16x16">
    <link rel="shortcut icon" href="/img/favicon.png">
  <meta name="description" content="Daftar akun Serapay untuk membeli akun game online terpercaya dengan garansi 100% aman.">
  <meta name="keywords" content="daftar akun game, jual akun game terpercaya, serapay register">

  <link rel="stylesheet" href="/css/register.css">
</head>

<body>

  <div class="auth-container">
    <div class="auth-box">

<div class="logo-box">
   <img src="/img/logo.png" alt="Serapay Logo">
</div>

      <h2>Daftar Akun Baru</h2>

      <form id="registerForm">

        <div class="form-group">
          <label>Nama</label>
          <input type="text" name="name" placeholder="Nama lengkap" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Alamat email" required>
        </div>

        <div class="form-group">
          <label>No HP</label>
          <input type="tel" name="phone" placeholder="08xxxxxxxxxx" required>
        </div>

<div class="form-group">
  <label>Password</label>

  <div style="position:relative;">
    <input type="password" name="password" id="password"
      placeholder="Minimal 6 karakter" required
      style="width:100%; padding-right:40px;">

    <!-- ICON SHOW -->
    <span onclick="togglePassword('password')" 
      style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
      
      <!-- SVG ICON KAMU -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
        <path d="M1 12C1 12 5 20 12 20C19 20 23 12 23 12"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3"
          stroke="black" stroke-width="2"/>
      </svg>

    </span>
  </div>
</div>


<div class="form-group">
  <label>Ulangi Password</label>

  <div style="position:relative;">
    <input type="password" name="confirm" id="confirm"
      placeholder="Ulangi password" required
      style="width:100%; padding-right:40px;">

    <!-- ICON SHOW -->
    <span onclick="togglePassword('confirm')" 
      style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
      
      <!-- SVG ICON KAMU -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
        <path d="M1 12C1 12 5 20 12 20C19 20 23 12 23 12"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3"
          stroke="black" stroke-width="2"/>
      </svg>

    </span>
  </div>
</div>

<button type="submit" class="btn">Daftar Sekarang</button>

<div id="notif" style="margin-top:10px; text-align:center; font-size:14px;"></div>

<!-- Checkbox syarat -->
<div style="margin-top:12px; text-align:center; font-size:12px; color:#666; line-height:1.5;">

  <label style="display:flex; justify-content:center; align-items:flex-start; gap:8px;">
    
    <input 
      type="checkbox" 
      id="agreeTerms" 
      required
      style="margin-top:3px; accent-color:#ec4899; cursor:pointer;"
    >

    <span>
      Saya menyetujui 
      <a href="/syarat-dan-ketentuan-kebijakan-privasi.html#syarat" 
         style="color:#ec4899; text-decoration:none;">
         Syarat & Ketentuan
      </a> 
      dan 
      <a href="/syarat-dan-ketentuan-kebijakan-privasi.html#privasi" 
         style="color:#ec4899; text-decoration:none;">
         Kebijakan Privasi
      </a>.
    </span>

  </label>

</div>

</form>

<div class="extra-links">
  Sudah punya akun? <a href="/login">Login</a>
</div>

<script>
function showNotif(msg, type){
  const el = document.getElementById("notif");

  el.innerText = msg;
  el.className = "";

  el.style.padding = "8px";
  el.style.borderRadius = "8px";
  el.style.marginTop = "10px";
  el.style.textAlign = "center";
  el.style.fontSize = "14px";

  if(type === "success"){
    el.style.background = "#dcfce7";
    el.style.color = "#166534";
  } else {
    el.style.background = "#fee2e2";
    el.style.color = "#991b1b";
  }

  el.style.opacity = "1";

  setTimeout(()=>{
    el.style.opacity = "0";
    setTimeout(()=> el.innerText = "", 300);
  }, 2500);
}

// SUBMIT REGISTER
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const name = document.querySelector('[name="name"]').value.trim();
  const email = document.querySelector('[name="email"]').value.trim();
  const phone = document.querySelector('[name="phone"]').value.trim();
  const password = document.querySelector('[name="password"]').value.trim();
  const confirm = document.querySelector('[name="confirm"]').value.trim();
const agreeTerms = document.getElementById("agreeTerms").checked;

if(!agreeTerms){
  return showNotif("Kamu wajib menyetujui syarat & kebijakan privasi", "error");
}
  if(password !== confirm){
    return showNotif("Password tidak cocok", "error");
  }

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password })
    });

    const data = await res.json();

if (data.success) {

  if (data.token) {
    localStorage.setItem(
      "token",
      data.token
    );
  }

  showNotif(
    "Registrasi berhasil!",
    "success"
  );

  setTimeout(() => {

    const redirect =
      localStorage.getItem(
        "redirectAfterLogin"
      );

    if (redirect) {

      localStorage.removeItem(
        "redirectAfterLogin"
      );

      window.location.href =
        redirect;

    } else {

      window.location.href =
        "/home";

    }

  }, 800);

} else {
      showNotif(data.message || "Gagal daftar", "error");
    }

  } catch (err) {
    console.error(err);
    showNotif("Server error", "error");
  }

}); // ✅ INI YANG KURANG SEBELUMNYA
</script>
<script>
function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
