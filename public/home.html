<script>
let activeOrders = [];
let lastState = "";
const resendCooldown = {};
const lastInbox = {};
let history = JSON.parse(localStorage.getItem("history") || "[]");
function setCooldown(orderId, seconds = 60){

  const data = JSON.parse(localStorage.getItem("resend_cooldown") || "{}");

  data[orderId] = Date.now() + seconds * 1000;

  localStorage.setItem("resend_cooldown", JSON.stringify(data));
}

function isCooldown(orderId){
  const data = JSON.parse(localStorage.getItem("resend_cooldown") || "{}");
  return data[orderId] && data[orderId] > Date.now();
}

function getCooldownRemaining(orderId){
  const data = JSON.parse(localStorage.getItem("resend_cooldown") || "{}");
  if(!data[orderId]) return 0;

  return Math.ceil((data[orderId] - Date.now()) / 1000);
}
const otpStorage = JSON.parse(localStorage.getItem("otpStorage") || "{}");
let renderedOTP = {}; 
const token = localStorage.getItem("token");
const socket = io();

function safeEmail(email){
  return (email || "")
    .toLowerCase()
    .replace(/.*<(.+?)>.*/g, "$1")
    .trim()
    .replace(/[^a-z0-9]/g, "_");
}

socket.on("connect", () => {
  console.log("connected");

  if (!token) return;

  fetch("/api/me", {
    headers: { authorization: token }
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      console.log("ROOM JOIN REQUEST:", data.user.email);
      socket.emit("joinUser", data.user.email);
    }
  });
});

socket.on("joinUser", (email) => {
  console.log("JOIN ROOM CONFIRMED:", email);
});

socket.on("gmailUpdate", (data) => {

  const match = data.match || data;
  if (!match.orderId) return;

  const order = activeOrders.find(o => o.orderId === match.orderId);
  if (!order) return;

  const emailTarget = order.email || "";
  const key = safeEmail(emailTarget);

  const el = document.getElementById("msg-" + key);
  if (!el) return;

  const messageId = (data.subject || "") + "|" + (data.snippet || "");
if (renderedOTP[key] === messageId) return;
renderedOTP[key] = messageId;
  if (lastInbox[key] === messageId) return;
  lastInbox[key] = messageId;

  otpStorage[key] = {
    email: data.email,
    subject: data.subject,
    snippet: data.snippet
  };
  localStorage.setItem("otpStorage", JSON.stringify(otpStorage));

  el.innerHTML = `
    <div style="color:#ec4899;font-weight:600;margin-bottom:4px;">
      📩 Pesan Masuk
    </div>
    <div><b>From:</b> ${data.email || "-"}</div>
    <div><b>Subject:</b> ${data.subject || "-"}</div>
    <div><b>Pesan:</b> ${data.snippet || "-"}</div>
  `;
  const sound = document.getElementById("notifSound");
if (sound) {
  sound.currentTime = 0;
  sound.play().catch(() => {});
}
});

document.addEventListener("click", () => {
  const sound = document.getElementById("notifSound");
  if (sound) {
    sound.play().then(() => {
      sound.pause();
      sound.currentTime = 0;
    }).catch(() => {});
  }
}, { once: true });

function normalizeEmail(email){
  return (email || "")
    .toLowerCase()
    .replace(/.*<(.+?)>.*/g, "$1")
    .trim()
    .replace(/[^a-z0-9]/g, "_");
}

});

window.location.href = "/index.html";

function plus(){
  let j = document.getElementById("jumlah");
  j.value = parseInt(j.value || 1) + 1;
}

function minus(){
  let j = document.getElementById("jumlah");
  if(j.value > 1) j.value--;
}

async function loadUser(){
  try{
    const res = await fetch("/api/me",{
      headers:{
        authorization: token
      }
    });

    const data = await res.json();

    console.log(data);

    if(data.success){
document.getElementById("nama").innerText =
  data.user.name.split(" ")[0];

      document.getElementById("id").innerText =
        data.user.id;

document.getElementById("saldo").innerText =
  Number(data.user.saldo || 0)
  .toLocaleString("id-ID");


    }

  }catch(err){
    console.log("loadUser error", err);
  }
}

async function order(){

  if(isOrdering) return;
  isOrdering = true;

  const btn = document.querySelector(".btn");
  btn.disabled = true;
  btn.innerText = "Memproses...";

  const produkSelect = document.getElementById("produk");
  const produk = produkSelect.value;
  const server = document.getElementById("server").value;
  const jumlah = parseInt(document.getElementById("jumlah").value);

  try{

    const res = await fetch("/api/order",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "authorization": token
      },
      body: JSON.stringify({
        produk,
        jumlah,
        server
      })
    });

    const data = await res.json();

    if(data.success){

      if(data.saldo !== undefined){
        document.getElementById("saldo").innerText =
          Number(data.saldo).toLocaleString("id-ID");
      }

      await loadProduk();
      document.getElementById("produk").value = produk;
      document.getElementById("result").style.display = "block";
      await loadActiveOrders();
      document.getElementById("jumlah").value = 1;
      showToast("Order berhasil");
    }else{
      alert(data.message || "Sesi login habis, silahkan login ulang");
    }

  }catch(err){
    console.error(err);
    alert("Sesi login habis, silahkan login ulang");
  }finally{
    btn.disabled = false;
    btn.innerText = "Order Sekarang";
    isOrdering = false;
  }
}

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  }, 1500);
}

function copyText(text){
  if (!navigator.clipboard) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);

    showToast("Tersalin!");
    return;
  }

  navigator.clipboard.writeText(text)
    .then(() => {
      showToast("Tersalin!");
    })
    .catch(() => {
      showToast("Gagal menyalin");
    });
}

let selectedRefundOrder = null;

function refundOrder(id){
  const item = activeOrders.find(x => x.uniqueId === id);

  if(!item){
    alert("Order tidak ditemukan");
    return;
  }

  if(item.status === "pending_refund"){
    alert("Refund sudah diajukan");
    return;
  }

  if(item.status === "done"){
    alert("Order sudah selesai");
    return;
  }

  if(item.status === "refunded"){
    alert("Order sudah direfund");
    return;
  }

  if(item.status === "refund_rejected"){
    alert("Refund sebelumnya ditolak");
    return;
  }

  selectedRefundOrder = item;

  document.getElementById("refundReason").value = "";
  document.getElementById("refundCustomReason").value = "";
  document.getElementById("refundCustomReason").style.display = "none";
  document.getElementById("refundModal").style.display = "flex";
}

async function syncRefundStatus(){

  try{

    const res = await fetch("/api/refund", {
      headers:{ authorization: token }
    });

    const data = await res.json();
    if(!data.success) return;

    const refunds = data.data || [];

    let updated = false;

    activeOrders.forEach(order => {

const match = refunds.find(
  r => r.orderId === order.orderId
);

if(match){

  if(match.status === "approved" || match.status === "success"){
    
    if(order.status !== "refunded"){
      order.status = "refunded";
	order.refundFinishedAt = Date.now();
      updated = true;
    }

  } 

  else if(match.status === "rejected"){
    
    if(order.status !== "refund_rejected"){
      order.status = "refund_rejected";
order.refundFinishedAt = Date.now();
      updated = true;
    }

  }

  else if(match.status === "pending"){
    
    if(order.status !== "pending_refund"){
      order.status = "pending_refund";
      updated = true;
    }

  }

}

    });

    if(updated){
      localStorage.setItem("activeOrders", JSON.stringify(activeOrders));
      renderOrders();
      await loadUser();
    }

  }catch(err){
    console.error("Sync refund error:", err);
  }
}

async function submitRefund(){
  if(!selectedRefundOrder){
    alert("Order tidak ditemukan");
    return;
  }

  const reason = document.getElementById("refundReason").value;
  const customReason = document.getElementById("refundCustomReason").value.trim();

  if(!reason){
    alert("Pilih alasan refund");
    return;
  }

  let finalReason = reason;

  if(reason === "Lainnya"){
    if(!customReason){
      alert("Isi alasan refund");
      return;
    }
    finalReason = customReason;
  }

  try{
    const res = await fetch("/api/refund", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        authorization: token
      },
      body: JSON.stringify({
        id: selectedRefundOrder.email,
        orderId: selectedRefundOrder.orderId,
        nominal: selectedRefundOrder.harga,
        alasan: finalReason 
      })
    });

    const data = await res.json();

    if(data.success){
      showToast("Sedang Ditinjau");
      closeRefundModal();

      await loadActiveOrders();
      renderOrders();
    }else{
      alert(data.message || "Refund gagal");
    }

  }catch(err){
    console.log(err);
    alert("Terjadi kesalahan");
  }
}

async function loadActiveOrders(){
  try{
    const res = await fetch("/api/active-orders",{
      headers:{
        authorization: token
      }
    });

    const data = await res.json();

    if(data.success){

      let newOrders = [];

data.data.forEach(order => {
  if(
    order.status === "done" ||
    order.status === "refunded" ||
    order.status === "refund_rejected"
  ){
    return;
  }

  (order.data || []).forEach((item, index) => {

    const old = activeOrders.find(o => o.orderId === order.id);

newOrders.push({
  uniqueId: order.id + "_" + index,
  orderId: order.id,
  type: order.type,
  email:
    item?.email ||
    item?.to ||
    item?.deliveredTo ||
    "-",
  pass: item?.pass || "-",
  backup: item?.backup || [],
  status: order.status,

  createdAt:
    Number(order.created_at) ||
    Number(order.time) ||
    Date.now(),

refundFinishedAt:
  order.refundFinishedAt ||
  old?.refundFinishedAt ||
  null,

harga:
  (order.type || "").toLowerCase().trim() === "gmail fresh"
    ? 4500
  : (order.type || "").toLowerCase().trim() === "gmail bekas"
    ? 1500
  : (order.type || "").toLowerCase().trim() === "email custom"
    ? 1000
  : (order.type || "").toLowerCase().trim() === "facebook fresh"
    ? 3300
  : 0
    });

  });

});
      activeOrders = newOrders;

      localStorage.setItem(
        "activeOrders",
        JSON.stringify(activeOrders)
      );

      renderOrders();
    }

  }catch(err){
    console.log(err);
  }
}

function autoCompleteOrders(){
  let updated = false;
  const now = Date.now();

  const ACTIVE_LIMIT = 1200000;
  const REFUND_LIMIT = 600000;

  const newActiveOrders = [];

  activeOrders.forEach(order => {

    const createdAt = Number(order.createdAt) || now;
    const refundAt  = Number(order.refundFinishedAt) || null;

    const age = now - createdAt;
    const refundAge = refundAt ? (now - refundAt) : null;

if(order.status === "active" && age >= ACTIVE_LIMIT){

  fetch("/api/order/done", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      authorization: token
    },
    body: JSON.stringify({ orderId: order.orderId })
  });

  const finishedOrder = {
    ...order,
    status: "done",
    finishedAt: now
  };

  history.push(finishedOrder);
  updated = true;
  return;
}

    if(order.status === "refunded" || order.status === "refund_rejected"){
      const baseTime = refundAt || createdAt;

      if(now - baseTime >= REFUND_LIMIT){
        history.push({
  ...order,
  status: "done"
});
        updated = true;
        return;
      }
    }

    newActiveOrders.push(order);
  });

  if(updated){
    activeOrders = newActiveOrders;

    localStorage.setItem("activeOrders", JSON.stringify(activeOrders));
    localStorage.setItem("history", JSON.stringify(history));

    renderOrders();
  }
}

function restoreCooldownUI(){

  const data = JSON.parse(localStorage.getItem("resend_cooldown") || "{}");

  Object.keys(data).forEach(orderId => {

    const expire = data[orderId];
    if(expire <= Date.now()){
      delete data[orderId];
      return;
    }

    const remaining = Math.ceil((expire - Date.now()) / 1000);

    const btn = document.querySelector(`.resend-btn[data-orderid="${orderId}"]`);
    if(!btn) return;

    btn.disabled = true;
    btn.innerText = `tunggu ${remaining}s`;

    let r = remaining;

    const interval = setInterval(() => {
      r--;

      if(r <= 0){
        clearInterval(interval);
        btn.disabled = false;
        btn.innerText = "dapatkan";
        return;
      }

      btn.innerText = `tunggu ${r}s`;
    }, 1000);
  });

  localStorage.setItem("resend_cooldown", JSON.stringify(data));
}

function updateTimerUI(){
  document.querySelectorAll(".order-box").forEach((el, i) => {

    const order = activeOrders[i];
    if(!order || order.status !== "active") return;

    const sisa = Math.max(
      0,
      Math.ceil((1200000 - (Date.now() - order.createdAt)) / 1000)
    );

    const menit = Math.floor(sisa / 60);
    const detik = sisa % 60;

    const waktuFormat =
      `${menit.toString().padStart(2,"0")}:` +
      `${detik.toString().padStart(2,"0")}`;

    const timer = el.querySelector(".timer-box span");
    if(timer) timer.innerText = waktuFormat;
  });
}

const pollingMap = {};

async function resendEmail(email, orderId, btn){
  if(isCooldown(orderId)){
    const remaining = getCooldownRemaining(orderId);

    btn.disabled = true;
    btn.innerText = `tunggu ${remaining}s`;
    return;
  }

  setCooldown(orderId, 60);

  let remaining = 60;

  btn.disabled = true;
  btn.innerText = `tunggu ${remaining}s`;

  const cooldownInterval = setInterval(() => {

    remaining--;

    if(remaining <= 0){
      clearInterval(cooldownInterval);
      btn.disabled = false;
      btn.innerText = "dapatkan";
      return;
    }

    btn.innerText = `tunggu ${remaining}s`;

  }, 1000);

  const safeKey = safeEmail(email);
  const box = document.getElementById("msg-" + safeKey);
  if(!box) return;

const oldContent = box.innerHTML;

box.innerHTML = `
  ${oldContent}
  <div id="loading-${safeKey}" style="margin-top:6px;color:#ec4899;font-size:12px;">
    <span class="spinner"></span> Menunggu pesan baru...
  </div>
`;

  if(pollingMap[orderId]) return;
  pollingMap[orderId] = true;

  let tries = 0;
  const maxTry = 12;

  const timer = setInterval(async () => {

    tries++;

    try {

      const res = await fetch("/api/gmail/check", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          authorization: token
        },
        body: JSON.stringify({ email, orderId })
      });

      const data = await res.json();

      if(data.success && data.found){

        clearInterval(timer);
        pollingMap[orderId] = false;

        otpStorage[safeKey] = {
          email: data.email,
          subject: data.subject,
          snippet: data.snippet
        };

        localStorage.setItem("otpStorage", JSON.stringify(otpStorage));
		
		const loading = document.getElementById("loading-" + safeKey);
if(loading) loading.remove();

        box.innerHTML = `
          <div style="color:#ec4899;font-weight:600;margin-bottom:4px;">
            📩 Pesan Masuk
          </div>
          <div><b>From:</b> ${data.email || "-"}</div>
          <div><b>Subject:</b> ${data.subject || "-"}</div>
          <div><b>Pesan:</b> ${data.snippet || "-"}</div>
        `;
      }

if(tries >= maxTry){
  clearInterval(timer);
  pollingMap[orderId] = false;

  const loading = document.getElementById("loading-" + safeKey);
  if(loading) loading.remove();
}

    } catch(err){
      clearInterval(timer);
      pollingMap[orderId] = false;
      const loading = document.getElementById("loading-" + safeKey);
if(loading) loading.remove();
    }

  }, 5000);
}
