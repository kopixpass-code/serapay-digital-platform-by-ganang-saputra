<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • SeraPay</title>
	<link rel="icon" href="/img/favicon.png" sizes="32x32">
    <link rel="icon" href="/img/favicon.png" sizes="16x16">
    <link rel="shortcut icon" href="/img/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-50 to-white min-h-screen flex items-center justify-center">

  <!-- Card Login -->
  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-pink-600">SeraPay</h1>
      <p class="text-gray-500 text-sm mt-1">Login ke akun kamu</p>
    </div>

<!-- Form -->
<form id="loginForm" class="space-y-4">

  <div>
    <label class="text-sm font-semibold">Email</label>
    <input type="email" id="email"
      class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
      placeholder="Masukkan email" required>
  </div>

  <div>
    <label class="text-sm font-semibold">Password</label>
    <input type="password" id="password"
      class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
      placeholder="Masukkan password" required>
  </div>

  <!-- Button -->
  <button type="submit"
    class="w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-lg font-semibold transition">
    Login
  </button>

<!-- Teks kecil -->
<p class="text-xs text-gray-500 text-center leading-relaxed mt-3">
  Dengan login, kamu menyetujui 
  <a href="/syarat-dan-ketentuan-kebijakan-privasi.html#syarat" 
     class="text-pink-500 hover:underline">
     Syarat & Ketentuan
  </a> 
  dan 
  <a href="/syarat-dan-ketentuan-kebijakan-privasi.html#privasi" 
     class="text-pink-500 hover:underline">
     Kebijakan Privasi
  </a>.
</p>

</form>

<!-- 🔥 NOTIF PINDAH KE LUAR FORM -->
<div id="notif" class="hidden mt-4 text-sm px-3 py-2 rounded-lg text-center"></div>

<!-- 🔥 EXTRA CENTER -->
<div class="text-center text-sm mt-4">
  <a href="/lupapassword" class="text-pink-500 hover:underline">Lupa Password?</a>
  <span class="mx-2">•</span>
  <a href="/daftar" class="text-pink-500 hover:underline">Daftar</a>
</div>

  <!-- Script Login -->
  
  <script>
function showToast(message, type="success"){
  const toast = document.getElementById("toast");
  const box = document.getElementById("toastBox");
  const msg = document.getElementById("toastMsg");

  msg.innerText = message;

  // warna beda
  if(type === "success"){
    box.className = "px-4 py-3 rounded-lg shadow-lg text-white text-sm flex items-center gap-2 bg-green-500";
  }else{
    box.className = "px-4 py-3 rounded-lg shadow-lg text-white text-sm flex items-center gap-2 bg-red-500";
  }

  toast.classList.remove("hidden");

  // animasi masuk
  setTimeout(()=>{
    box.classList.remove("opacity-0","translate-y-2");
  },10);

  // hilang otomatis
  setTimeout(()=>{
    box.classList.add("opacity-0","translate-y-2");
    setTimeout(()=> toast.classList.add("hidden"),300);
  },2500);
}
</script>
<script>
function showNotif(message, type="success"){
  const notif = document.getElementById("notif");

  notif.innerText = message;
  notif.classList.remove("hidden");

  // reset class dulu
  notif.className = "mt-3 text-sm px-3 py-2 rounded-lg";

  if(type === "success"){
    notif.classList.add("bg-green-100","text-green-700");
  }else{
    notif.classList.add("bg-red-100","text-red-700");
  }

  // hilang otomatis
  setTimeout(()=>{
    notif.classList.add("hidden");
  },3000);
}
</script>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(data.success){
      // simpan token
      localStorage.setItem("token", data.token);

      showNotif("Login berhasil", "success");
      const redirect =
  localStorage.getItem(
    "redirectAfterLogin"
  );

if (redirect) {

  localStorage.removeItem(
    "redirectAfterLogin"
  );

  window.location.href =
    redirect;

} else {

  window.location.href =
    "/home";

}
    }else{
      showNotif("Email atau password salah", "error");
    }

  }catch(err){
    showToast("Server error", "error");
  }
});
</script>

<div id="toast" class="fixed top-5 right-5 z-50 hidden">
  <div id="toastBox"
    class="px-4 py-3 rounded-lg shadow-lg text-white text-sm flex items-center gap-2 transition-all duration-300 opacity-0 translate-y-2">
    
    <span id="toastMsg">Pesan</span>
  </div>
</div>

</body>
</html>
