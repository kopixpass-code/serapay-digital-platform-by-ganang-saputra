<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lupa Password • SeraPay</title>

<link rel="icon" href="/img/favicon.png" sizes="32x32">
<link rel="icon" href="/img/favicon.png" sizes="16x16">
<link rel="shortcut icon" href="/img/favicon.png">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family: Inter, sans-serif;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-100 via-pink-50 to-white p-5">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">

    <!-- HEADER -->
    <div class="text-center mb-8">

        <div class="w-20 h-20 mx-auto rounded-full bg-pink-100 flex items-center justify-center text-4xl mb-4">
            🔐
        </div>

        <h1 class="text-3xl font-bold text-pink-600">
            Lupa Password
        </h1>

        <p id="subtitle" class="text-gray-500 mt-2 text-sm">
            Masukkan email akun Anda untuk menerima kode OTP.
        </p>

    </div>

    <!-- EMAIL -->
    <form id="emailForm" class="space-y-5">

        <div>
            <label class="text-sm font-semibold text-gray-700">
                Email
            </label>

            <input
                type="email"
                id="email"
                placeholder="contoh@gmail.com"
                required
                class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"
            >
        </div>

        <button
            id="emailBtn"
            class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-xl font-semibold transition"
        >
            Kirim OTP
        </button>

    </form>

    <!-- OTP -->
    <form id="otpForm" class="space-y-5 hidden">

        <div>
            <label class="text-sm font-semibold text-gray-700">
                Kode OTP
            </label>

            <input
                type="text"
                id="otp"
                maxlength="6"
                placeholder="Masukkan 6 digit OTP"
                required
                class="w-full mt-2 px-4 py-3 text-center text-2xl tracking-[10px] border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"
            >
        </div>

        <div class="text-center text-sm text-gray-500">
            OTP berlaku selama
            <span id="timer" class="font-bold text-pink-600">
                05:00
            </span>
        </div>

        <button
            class="w-full bg-pink-500 hover:bg-pink-600 text-white py-3 rounded-xl font-semibold transition"
        >
            Verifikasi OTP
        </button>

        <button
            type="button"
            id="resendBtn"
            class="w-full border border-pink-500 text-pink-500 py-3 rounded-xl font-semibold hidden"
        >
            Kirim Ulang OTP
        </button>

    </form>

    <!-- RESET PASSWORD -->
    <form id="resetForm" class="space-y-5 hidden">

        <div>
            <label class="text-sm font-semibold text-gray-700">
                Password Baru
            </label>

            <input
                type="password"
                id="password"
                placeholder="Minimal 5 karakter"
                required
                class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"
            >
        </div>

        <div>
            <label class="text-sm font-semibold text-gray-700">
                Konfirmasi Password
            </label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Ulangi password"
                required
                class="w-full mt-2 px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400"
            >
        </div>

        <button
            class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-xl font-semibold transition"
        >
            Reset Password
        </button>

    </form>

    <div class="text-center mt-6 text-sm">
        <a href="/login" class="text-pink-500 hover:underline">
            ← Kembali ke Login
        </a>
    </div>

</div>

<script>

let savedEmail = "";
let countdown;
let expiredAt = 0;

/* =========================
   TIMER OTP
========================= */

function startTimer(endTime){

    clearInterval(countdown);

    countdown = setInterval(()=>{

        const now = Date.now();

        const diff = endTime - now;

        if(diff <= 0){

            clearInterval(countdown);

            document.getElementById("timer").textContent = "00:00";

            document.getElementById("resendBtn")
                .classList.remove("hidden");

            return;
        }

        const minutes = Math.floor(diff / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        document.getElementById("timer").textContent =
            `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;

    },1000);

}

/* =========================
   EMAIL
========================= */

emailForm.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const email =
        document.getElementById("email").value.trim();

    const btn =
        document.getElementById("emailBtn");

    btn.disabled = true;
    btn.textContent = "Mengirim...";

    try{

        const res = await fetch("/api/lupa/check",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({ email })
        });

        const data = await res.json();

        if(!data.success){
            showToast(
                data.message || "Email tidak ditemukan",
                "error"
            );
            return;
        }

        savedEmail = email;
        expiredAt = data.expiredAt;

        document.getElementById("subtitle").textContent =
            "Masukkan kode OTP yang telah dikirim ke email Anda.";

        emailForm.classList.add("hidden");
        otpForm.classList.remove("hidden");

        startTimer(expiredAt);

        showToast(
            "OTP berhasil dikirim ke email Anda",
            "success"
        );

    }catch(err){

        showToast(
            "Terjadi kesalahan pada server.",
            "error"
        );

    }finally{

        // hanya reset jika form email masih tampil
        if(!emailForm.classList.contains("hidden")){
            btn.disabled = false;
            btn.textContent = "Kirim OTP";
        }

    }

});

/* =========================
   VERIFY OTP
========================= */

otpForm.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const otp =
        document.getElementById("otp").value.trim();

    const res = await fetch("/api/lupa/verify",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:savedEmail,
            otp
        })
    });

    const data = await res.json();

    if(!data.success){
        showToast(
    data.message || "OTP salah",
    "error"
);
        return;
    }

    otpForm.classList.add("hidden");
    resetForm.classList.remove("hidden");

    document.getElementById("subtitle").textContent =
        "Masukkan password baru Anda.";

});

/* =========================
   RESEND OTP
========================= */

resendBtn.addEventListener("click", async()=>{

    const res = await fetch("/api/lupa/resend-otp",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:savedEmail
        })
    });

    const data = await res.json();

    if(!data.success){
        showToast(
    data.message,
    "error"
);
        return;
    }

    expiredAt = data.expiredAt;

    resendBtn.classList.add("hidden");

    startTimer(expiredAt);

    showToast(
    "OTP baru berhasil dikirim.",
    "success"
);

});

/* =========================
   RESET PASSWORD
========================= */

resetForm.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const password =
        document.getElementById("password").value;

    const confirm =
        document.getElementById("confirmPassword").value;

    if(password.length < 5){
        showToast(
    "Password minimal 5 karakter.",
    "warning"
);
        return;
    }

    if(password !== confirm){
        showToast(
    "Konfirmasi password tidak sama.",
    "warning"
);
        return;
    }

    const res = await fetch("/api/lupa/reset",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:savedEmail,
            password
        })
    });

    const data = await res.json();

    if(!data.success){
        showToast(
    data.message || "Gagal reset password.",
    "error"
);
        return;
    }

    showToast("Password berhasil direset.", "success");

    window.location.href = "/login";

});

</script>

<script>
function showToast(message, type = "success") {

    const colors = {
        success: "bg-green-500",
        error: "bg-red-500",
        warning: "bg-yellow-500 text-black",
        info: "bg-blue-500"
    };

    const icons = {
        success: "✓",
        error: "✕",
        warning: "!",
        info: "i"
    };

    const toast = document.createElement("div");

    toast.className = `
        ${colors[type]}
        text-white
        px-4 py-2
        rounded-full
        shadow-lg
        text-sm
        font-medium
        flex items-center gap-2
        opacity-0
        -translate-y-5
        transition-all duration-300
        max-w-[90vw]
    `;

    toast.innerHTML = `
        <span>${icons[type]}</span>
        <span>${message}</span>
    `;

    const container =
        document.getElementById("toastContainer");

    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.remove(
            "opacity-0",
            "-translate-y-5"
        );
    }, 10);

    setTimeout(() => {

        toast.classList.add(
            "opacity-0",
            "-translate-y-5"
        );

        setTimeout(() => {
            toast.remove();
        }, 300);

    }, 2500);
}
</script>

<div id="toastContainer"
class="fixed top-5 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center">
</div>

</body>
</html>
