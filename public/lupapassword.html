<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupa Password • SeraBot</title>
	<link rel="icon" href="/img/favicon.png" sizes="32x32">
    <link rel="icon" href="/img/favicon.png" sizes="16x16">
    <link rel="shortcut icon" href="/img/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family: 'Inter', sans-serif;
}
</style>
</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-50 to-white min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold text-pink-600">Reset Password</h1>
    <p class="text-gray-500 text-sm mt-1">Masukkan email akun kamu</p>
  </div>

  <!-- STEP 1: CEK EMAIL -->
  <form id="checkForm" class="space-y-4">

    <div>
      <label class="text-sm font-semibold">Email</label>
      <input type="email" id="email"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
        placeholder="contoh: nama@gmail.com"
        required>
    </div>

    <button type="submit"
      class="w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-lg font-semibold">
      Cek Email
    </button>

  </form>

  <!-- STEP 2: RESET PASSWORD -->
  <form id="resetForm" class="space-y-4 hidden mt-4">

    <div>
      <label class="text-sm font-semibold">Password Baru</label>
      <input type="password" id="newPassword"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-400"
        placeholder="Masukkan password baru"
        required>
    </div>

    <button type="submit"
      class="w-full bg-pink-600 hover:bg-pink-700 text-white py-2 rounded-lg font-semibold">
      Reset Password
    </button>

  </form>

  <div class="text-center text-sm mt-4">
    <a href="/login" class="text-pink-500 hover:underline">Kembali ke Login</a>
  </div>

</div>

<script>
let savedEmail = "";

/* STEP 1: CEK EMAIL */
document.getElementById("checkForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  // 🔥 VALIDASI EMAIL HARUS LENGKAP
  if(!email.includes("@") || !email.includes(".")){
    alert("Masukkan email lengkap yang valid!");
    return;
  }

  const res = await fetch("/api/lupa/check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  if(data.success){
    savedEmail = email;

    alert("Email ditemukan, silakan ganti password");

    document.getElementById("checkForm").classList.add("hidden");
    document.getElementById("resetForm").classList.remove("hidden");

  }else{
    alert("Email tidak ditemukan");
  }
});

/* STEP 2: RESET PASSWORD */
document.getElementById("resetForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const password = document.getElementById("newPassword").value;

  if(password.length < 5){
    alert("Password minimal 5 karakter");
    return;
  }

  const res = await fetch("/api/lupa/reset", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: savedEmail,
      password
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Password berhasil direset!");
    window.location.href = "/login";
  }else{
    alert("Gagal reset password");
  }
});
</script>

</body>
</html>
