<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Pesanan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#fff7fb,#ffe4f1);
    min-height:100vh;
    color:#444;
    padding:2px;
    margin:0;
}

/* =======================
   CONTAINER
======================= */

.container{
    width:100%;
    max-width:none;
    margin:0;
    padding:0;
}

.header{
    background:#fff;
    border:1px solid #ffd4ea;
    border-radius:16px;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    box-shadow:0 5px 20px rgba(236,72,153,.08);
}

.title{
    font-size:20px;
    font-weight:700;
    color:#ec4899;
}

.btn-add{
    border:none;
    background:linear-gradient(135deg,#ec4899,#db2777);
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}

.btn-add:hover{
    transform:translateY(-2px);
}

/* =======================
   LAYOUT
======================= */

.layout{
    display:flex;
    gap:15px;
}

.sidebar{
    width:360px;
    background:#fff;
    border-radius:16px;
    padding:15px;
    border:1px solid #ffd4ea;
    box-shadow:0 5px 20px rgba(236,72,153,.08);
}

.sidebar h3{
    color:#ec4899;
    margin-bottom:8px;
    font-size:12px;
    font-weight:500;
}

.note-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.note-item{
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    background:#fff6fb;
    transition:.2s;
    border:1px solid transparent;
    font-size:13px;
}

.note-item:hover{
    border-color:#f9a8d4;
}

.note-item.active{
    background:linear-gradient(135deg,#ec4899,#db2777);
    color:#fff;
}

.main{
    flex:1;
    background:#fff;
    border-radius:16px;
    padding:15px;
    border:1px solid #ffd4ea;
    box-shadow:0 5px 20px rgba(236,72,153,.08);
}

.empty{
    text-align:center;
    color:#888;
    padding:60px 20px;
}

/* =======================
   HEADER NOTE
======================= */

.note-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.share-note-text,
.delete-note-text{
    display:flex;
    align-items:center;
    gap:4px;
    color:#ec4899;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    user-select:none;
    transition:.2s;
}

.share-note-text:hover,
.delete-note-text:hover{
    color:#db2777;
}

.delete-note-text:hover{
    color:#db2777;
    text-decoration:underline;
}

/* =======================
   TABEL EXCEL
======================= */

.table-wrap{
    overflow:auto;
    border:1px solid #ffd4ea;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    font-size:12px;
}

thead th{
    background:#fff0f7;
    color:#be185d;
    font-size:12px;
    font-weight:600;
}

th,
td{
    border:1px solid #ffd4ea;
    padding:3px 6px;
    height:28px;
    text-align:left;
}

tbody tr:hover{
    background:#fff7fb;
}

td input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-size:12px;
    height:22px;
}

td input:focus{
    background:#fff0f7;
}

th:first-child,
td:first-child{
    width:220px;
}

th:last-child,
td:last-child{
    width:260px;
}

/* =======================
   BADGE
======================= */

.badge{
    display:inline-block;
    padding:1px 5px;
    border-radius:6px;
    color:#fff;
    font-size:10px;
    font-weight:600;
    line-height:1.2;
    white-space:nowrap;
}

/* =======================
   POPUP
======================= */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:15px;
}

.popup.show{
    display:flex;
}

.popup-box{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:18px;
    padding:22px;
    border:1px solid #ffd4ea;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.popup-title{
    color:#ec4899;
    font-size:18px;
    font-weight:700;
    margin-bottom:15px;
}

.popup-box input,
.popup-box select{
    width:100%;
    border:1px solid #fbcfe8;
    border-radius:10px;
    padding:11px 12px;
    outline:none;
    font-size:14px;
    margin-bottom:15px;
}

.popup-box input:focus,
.popup-box select:focus{
    border-color:#ec4899;
}

.popup-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.cancel-btn{
    border:none;
    background:#f3f4f6;
    color:#444;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
}

.save-btn{
    border:none;
    background:linear-gradient(135deg,#ec4899,#db2777);
    color:#fff;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

/* =======================
   SCROLLBAR
======================= */

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-thumb{
    background:#f9a8d4;
    border-radius:20px;
}

::-webkit-scrollbar-track{
    background:#fff0f7;
}

.toggle-notes{
    display:none;
    width:100%;
    border:none;
    background:#fff;
    color:#ec4899;
    font-weight:600;
    padding:12px;
    border-radius:14px;
    margin-bottom:10px;
    border:1px solid #ffd4ea;
    cursor:pointer;
}

.sidebar.hide{
    display:none;
}

/* =======================
   MOBILE
======================= */

@media(max-width:768px){

.toggle-notes{
    display:block;
}

.sidebar{
    width:100%;
}

.layout{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.header{
    flex-direction:column;
    gap:10px;
}

.note-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

}

@media(max-width:768px){

.sidebar.hide{
    display:none;
}

}

.toast{
    position:fixed;
    left:50%;
    bottom:20px;

    transform:
    translateX(-50%)
    translateY(100px);

    background:rgba(17,24,39,.95);
    backdrop-filter:blur(12px);

    color:#fff;

    padding:12px 20px;

    border-radius:999px;

    font-size:13px;
    font-weight:600;

    white-space:nowrap;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.2);

    z-index:999999;

    opacity:0;
    visibility:hidden;

    transition:.3s;
}

.toast.show{
    opacity:1;
    visibility:visible;

    transform:
    translateX(-50%)
    translateY(0);
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="title" id="noteTitle">
📒 Catatan
</div>
    <button class="btn-add" onclick="openPopup()">＋ Buat Baru</button>
</div>

<button class="toggle-notes" onclick="toggleSidebar()">
☰ Daftar Catatan
</button>

<div class="layout">

<div class="sidebar">
    <h3>Daftar Catatan</h3>
    <div id="noteList" class="note-list"></div>
</div>

<div class="main" id="mainContent">

<div class="empty">
    Pilih catatan atau buat catatan baru.
</div>

</div>

</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<div class="popup-title">
Buat Catatan Baru
</div>

<select id="noteType">
    <option value="notepad">
        📝 Notepad
    </option>
	
    <option value="transaksi">
        📦 For Transaksi
    </option>
</select>

<input
type="text"
id="noteName"
placeholder="Masukkan nama catatan">

<div class="popup-actions">
<button class="cancel-btn" onclick="closePopup()">Batal</button>
<button class="save-btn" onclick="createNote()">Simpan</button>
</div>

</div>
</div>

<script>

let notes = {};
let currentNote = null;
let remitRowIndex = null;

const statuses = [
'Fresh Belum CO',
'Dikemas',
'Dikirim',
'Selesai',
'Menunggu Remit Otomatis',
'Dibatalkan'
];

async function saveStorage(){

    const token =
    localStorage.getItem(
      "token"
    );

    await fetch(
      "/api/catatan",
      {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json",

          Authorization:
          token
        },

        body:JSON.stringify({
          notes
        })

      }
    );

}

function openPopup(){
    document.getElementById('popup').classList.add('show');
}

function closePopup(){
    document.getElementById('popup').classList.remove('show');
    document.getElementById('noteName').value='';
}

function createNote(){

    let name =
    document.getElementById('noteName')
    .value.trim();

    let type =
    document.getElementById('noteType')
    .value;

    if(!name)
    return alert('Masukkan nama catatan');

    if(notes[name]){
        return alert('Nama sudah ada');
    }

    if(type === 'transaksi'){

        notes[name] = {

            type:'transaksi',

            data:[
                {
                    username:'',
                    status:'',
                    tanggal:''
                }
            ]
        };

    }else{

        notes[name] = {

            type:'notepad',

            content:''

        };

    }

    saveStorage();

    renderNotes();

    openNote(name);

    closePopup();
	showToast(
    "📒 Catatan berhasil dibuat"
);
}

function renderNotes(){

    let html='';
Object.keys(notes).forEach(name=>{

    const icon =
    notes[name].type === 'notepad'
    ? '📝'
    : '📦';

    html += `
    <div class="note-item
    ${currentNote===name?'active':''}"
    onclick="openNote('${name.replace(/'/g,"\\'")}')">

    ${icon} ${name}

    </div>
    `;
});

    document.getElementById('noteList').innerHTML=html;
}

function openNote(name){

    currentNote=name;
	
	if(window.innerWidth <= 768){

    document
    .querySelector('.sidebar')
    .classList.add('hide');

}

    renderNotes();
	
	const note = notes[name];

if(note.type === 'notepad'){

    document.getElementById(
    'mainContent'
    ).innerHTML = `

    <div class="note-header">

        <h2 style="color:#ec4899">
        📝 ${name}
        </h2>

<div style="display:flex;gap:18px;align-items:center;">

<span
class="share-note-text"
onclick="shareNote()">

<svg
width="16"
height="16"
viewBox="0 0 24 24"
fill="currentColor"
style="margin-right:5px;">
<path d="M21.707,11.293l-8-8A.99991.99991,0,0,0,12,4V7.54492A11.01525,11.01525,0,0,0,2,18.5V20a1,1,0,0,0,1.78418.62061,11.45625,11.45625,0,0,1,7.88672-4.04932c.0498-.00635.1748-.01611.3291-.02588V20a.99991.99991,0,0,0,1.707.707l8-8A.99962.99962,0,0,0,21.707,11.293ZM14,17.58594V15.5a.99974.99974,0,0,0-1-1c-.25488,0-1.2959.04932-1.56152.085A14.00507,14.00507,0,0,0,4.05176,17.5332,9.01266,9.01266,0,0,1,13,9.5a.99974.99974,0,0,0,1-1V6.41406L19.58594,12Z"/>
</svg>

Bagikan

</span>

<span
class="delete-note-text"
onclick="deleteNote()">

<svg
width="16"
height="16"
viewBox="0 0 24 24"
fill="currentColor"
style="margin-right:5px;">
<path d="M7 4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2h4a1 1 0 1 1 0 2h-1.069l-.867 12.142A2 2 0 0 1 17.069 22H6.93a2 2 0 0 1-1.995-1.858L4.07 8H3a1 1 0 0 1 0-2h4V4zm2 2h6V4H9v2zM6.074 8l.857 12H17.07l.857-12H6.074zM10 10a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1zm4 0a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1z"/>
</svg>

Hapus

</span>

</div>

    </div>

    <textarea
    id="notepadArea"
    oninput="saveNotepad()"
    style="
    width:100%;
    min-height:500px;
    border:1px solid #ffd4ea;
    border-radius:12px;
    padding:15px;
    font-size:14px;
    resize:vertical;
    outline:none;
    ">${note.content || ''}</textarea>

    `;

    return;
}

let rows='';

const rowsData =
notes[name].data || [];

rowsData.forEach((row,index)=>{

        rows+=`
        <tr>

        <td>
        <input
        type="text"
        value="${row.username||''}"
        onblur="saveUsername(${index},this.value)"
        onkeydown="checkEnter(event,${index})">
        </td>

        <td>
        ${getBadge(row.status,row.tanggal)}
        </td>

        </tr>
        `;
    });

    document.getElementById('mainContent').innerHTML=`

    <div class="note-header">

        <h2 style="color:#ec4899">${name}</h2>

<div style="display:flex;gap:18px;align-items:center;">

<span
class="share-note-text"
onclick="shareNote()">

<svg
width="16"
height="16"
viewBox="0 0 24 24"
fill="currentColor"
style="margin-right:5px;">
<path d="M21.707,11.293l-8-8A.99991.99991,0,0,0,12,4V7.54492A11.01525,11.01525,0,0,0,2,18.5V20a1,1,0,0,0,1.78418.62061,11.45625,11.45625,0,0,1,7.88672-4.04932c.0498-.00635.1748-.01611.3291-.02588V20a.99991.99991,0,0,0,1.707.707l8-8A.99962.99962,0,0,0,21.707,11.293ZM14,17.58594V15.5a.99974.99974,0,0,0-1-1c-.25488,0-1.2959.04932-1.56152.085A14.00507,14.00507,0,0,0,4.05176,17.5332,9.01266,9.01266,0,0,1,13,9.5a.99974.99974,0,0,0,1-1V6.41406L19.58594,12Z"/>
</svg>

Bagikan

</span>

<span
class="delete-note-text"
onclick="deleteNote()">

<svg
width="16"
height="16"
viewBox="0 0 24 24"
fill="currentColor"
style="margin-right:5px;">
<path d="M7 4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2h4a1 1 0 1 1 0 2h-1.069l-.867 12.142A2 2 0 0 1 17.069 22H6.93a2 2 0 0 1-1.995-1.858L4.07 8H3a1 1 0 0 1 0-2h4V4zm2 2h6V4H9v2zM6.074 8l.857 12H17.07l.857-12H6.074zM10 10a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1zm4 0a1 1 0 0 1 1 1v6a1 1 0 1 1-2 0v-6a1 1 0 0 1 1-1z"/>
</svg>

Hapus

</span>

</div>

    </div>

    <div class="table-wrap">

    <table>

    <thead>

    <tr>
    <th>Username</th>
    <th>Status</th>
    </tr>

    </thead>

    <tbody>
    ${rows}
    </tbody>

    </table>

    </div>
    `;
}

function saveNotepad(){

    notes[currentNote].content =
    document.getElementById(
    'notepadArea'
    ).value;

    saveStorage();
}

function updateCell(index,key,value){

    if(key === 'status' && value === 'Menunggu Remit Otomatis'){

        remitRowIndex = index;

        document.getElementById('remitDate').value =
        notes[currentNote].data[index].tanggal || '';

        document.getElementById('remitPopup')
        .classList.add('show');

        return;
    }

    notes[currentNote].data[index][key] = value;

    saveStorage();
    openNote(currentNote);
}

function saveUsername(index,value){

    notes[currentNote].data[index].username = value;

    saveStorage();

    if(value.trim() !== ''){
        openStatusPopup(index);
    }
}

function closeRemitPopup(){

    document
    .getElementById('remitPopup')
    .classList.remove('show');

    remitRowIndex = null;

    openNote(currentNote);
}

function saveRemitDate(){

    const tanggal =
    document.getElementById('remitDate').value;

    if(!tanggal){
        alert('Pilih tanggal terlebih dahulu');
        return;
    }

    notes[currentNote].data[remitRowIndex].status =
    'Menunggu Remit Otomatis';

    notes[currentNote].data[remitRowIndex].tanggal =
    tanggal;

    saveStorage();

    document
    .getElementById('remitPopup')
    .classList.remove('show');

    remitRowIndex = null;
	showToast(
    "📅 Tanggal remit disimpan"
);

    openNote(currentNote);
}

function checkEnter(e,index){

    if(e.key === "Enter"){

        e.preventDefault();

        let lastIndex =
        notes[currentNote].data.length - 1;

        if(index === lastIndex){

            notes[currentNote].data.push({
                username:'',
                status:'',
                tanggal:''
            });

            saveStorage();
            openNote(currentNote);
        }

    }

}

function deleteNote(){

    if(!confirm('Hapus catatan ini?')) return;

    delete notes[currentNote];

    saveStorage();

    currentNote=null;

    if(window.innerWidth <= 768){

        document
        .querySelector('.sidebar')
        .classList.remove('hide');

    }

    renderNotes();
	showToast(
    "🗑️ Catatan berhasil dihapus"
);

    document.getElementById('mainContent').innerHTML=
    `<div class="empty">
Pilih catatan atau buat catatan baru.
</div>`;
}

function getBadge(status,tanggal=''){

if(!status){
    return '';
}

let color='#9ca3af';
let text=status;

if(status==='Dikemas') color='#3b82f6';
if(status==='Dikirim') color='#2563eb';
if(status==='Selesai') color='#22c55e';
if(status==='Dibatalkan') color='#ef4444';

if(status==='Menunggu Remit Otomatis'){

    color='#f59e0b';

    if(tanggal){
        text='Menunggu Remit ' + formatTanggalIndonesia(tanggal);
    }
}

return `
<span class="badge"
style="background:${color}">
${text}
</span>
`;
}

function formatTanggalIndonesia(dateStr){

    if(!dateStr) return '';

    const bulan = [
        'Januari','Februari','Maret','April',
        'Mei','Juni','Juli','Agustus',
        'September','Oktober','November','Desember'
    ];

    const d = new Date(dateStr);

    return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
}

/* =========================
   POPUP STATUS
========================= */

let statusRowIndex = null;

function openStatusPopup(index){

    statusRowIndex = index;

    document
    .getElementById('statusPopup')
    .classList.add('show');
}

function closeStatusPopup(){

    document
    .getElementById('statusPopup')
    .classList.remove('show');
}

function saveStatusPopup(){

    const status =
    document.getElementById('statusSelect').value;

    if(status === 'Menunggu Remit Otomatis'){

        remitRowIndex = statusRowIndex;

        document
        .getElementById('statusPopup')
        .classList.remove('show');

        document
        .getElementById('remitPopup')
        .classList.add('show');

        return;
    }

    notes[currentNote].data[statusRowIndex].status = status;

    saveStorage();

    document
    .getElementById('statusPopup')
    .classList.remove('show');
	showToast(
    "✅ Status berhasil diperbarui"
);

    openNote(currentNote);
}

/* ========================= */

async function loadNotes(){

    const token =
    localStorage.getItem(
      "token"
    );

    if(!token){

        location.href =
        "/index";

        return;
    }

    const res =
    await fetch(
      "/api/catatan",
      {

        headers:{
          Authorization:
          token
        }

      }
    );

    const data =
    await res.json();

    if(data.success){

        notes =
        data.notes || {};

        renderNotes();

    }

}

async function loadUser(){

    const token =
    localStorage.getItem("token");

    if(!token) return;

    try{

        const res = await fetch(
            "/api/me",
            {
                headers:{
                    Authorization: token
                }
            }
        );

        const data = await res.json();

        if(data.success){

            const namaDepan =
            (data.user.name || "SeraPay")
            .split(" ")[0];

            document.getElementById(
                "noteTitle"
            ).innerHTML =
            `📒 Catatan ${namaDepan}`;

        }

    }catch(err){

        console.log(err);

    }
}

loadUser();
loadNotes();

if(window.innerWidth <= 768){

    document
    .querySelector('.sidebar')
    .classList.add('hide');

}

async function shareNote(){

    const token =
    localStorage.getItem("token");

    const res =
    await fetch(
        "/api/share-note",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                Authorization:token
            },
            body:JSON.stringify({
                noteName:currentNote
            })
        }
    );

    const data =
    await res.json();

    if(data.success){

        navigator.clipboard.writeText(
            data.url
        );

showToast(
    "🔗 Link berhasil disalin"
);

    }

}

function showToast(text){

    const toast =
    document.getElementById(
        "toast"
    );

    toast.innerHTML = text;

    toast.classList.add(
        "show"
    );

    clearTimeout(
        toast.timer
    );

    toast.timer =
    setTimeout(()=>{

        toast.classList.remove(
            "show"
        );

    },2500);

}

function toggleSidebar(){

    const sidebar =
    document.querySelector('.sidebar');

    if(sidebar.classList.contains('hide')){
        sidebar.classList.remove('hide');
    }else{
        sidebar.classList.add('hide');
    }

}

</script>
