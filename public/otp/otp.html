<script>

async function loadUserProfile(){

    const token =
    localStorage.getItem("token");

    if(!token){

        location.href =
        "/login";

        return;
    }

    try{

        const res =
        await fetch(
            "/api/me",
            {
                headers:{
                    Authorization:token
                }
            }
        );

        const result =
        await res.json();

        if(!result.success){

            localStorage.removeItem(
                "token"
            );

            location.href =
            "/login";

            return;
        }

        const user =
        result.user;

        document.getElementById(
            "userName"
        ).innerText =
        user.name;

        document.getElementById(
            "userId"
        ).innerText =
        "ID: " + user.id;

        document.getElementById(
            "userSaldo"
        ).innerText =
        "Rp " +
        Number(
            user.saldo || 0
        ).toLocaleString("id-ID");

    }catch(err){

        console.log(err);

    }

}

loadUserProfile();

</script>
<script>

function logout(){

    localStorage.removeItem(

    );

}

</script>

<script>

const otpOrdersContainer =
document.getElementById(
"otpOrdersContainer"
);

const emailOrdersContainer =
document.getElementById(
"emailOrdersContainer"
);

const activeTab =
localStorage.getItem(
"activeTab"
);

if(activeTab === "email"){

emailTab.click();

}

phoneTab.onclick = () => {
localStorage.setItem(
"activeTab",
"phone"
);

    phoneTab.classList.add(
        "active"
    );

    emailTab.classList.remove(
        "active"
    );

    phoneOrderCard.style.display =
    "block";

    emailOrderCard.style.display =
    "none";

    if(otpOrdersContainer){

        otpOrdersContainer
        .style.display =
        "block";

    }

    if(emailOrdersContainer){

        emailOrdersContainer
        .style.display =
        "none";

    }

};

emailTab.onclick = () => {
localStorage.setItem(
"activeTab",
"email"
);

    emailTab.classList.add(
        "active"
    );

    phoneTab.classList.remove(
        "active"
    );

    phoneOrderCard.style.display =
    "none";

    emailOrderCard.style.display =
    "block";

    if(otpOrdersContainer){

        otpOrdersContainer
        .style.display =
        "none";

    }

    if(emailOrdersContainer){

        emailOrdersContainer
        .style.display =
        "block";

    }

};

window.addEventListener(
"load",
()=>{

const activeTab =
localStorage.getItem(
"activeTab"
);

if(activeTab === "email"){

emailTab.click();

}else{

phoneTab.click();

}

});

</script>
