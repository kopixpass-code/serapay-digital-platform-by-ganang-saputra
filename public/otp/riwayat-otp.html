<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Riwayat OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff5f9;
padding:15px;
color:#333;
}

.title{
font-size:22px;
font-weight:700;
color:#e91e63;
margin-bottom:15px;
}

/* SEARCH */

.search-box{
position:relative;
margin-bottom:18px;
}

.search-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#e91e63;
font-size:14px;
}

.search-box input{
width:100%;
height:48px;
border:none;
outline:none;
padding:0 15px 0 42px;
border-radius:14px;
background:#fff;
box-shadow:
0 4px 12px rgba(233,30,99,.08);
font-size:14px;
}

/* CARD */

/* =====================
CARD
===================== */

.history-card{
background:#fff;
border-radius:16px;
padding:12px;
margin-bottom:10px;
border:1px solid #ffd6e6;
box-shadow:0 3px 10px rgba(233,30,99,.06);
}

/* HEADER */

.history-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
gap:8px;
}

.service-name{
font-size:14px;
font-weight:700;
color:#e91e63;
}

/* STATUS */

.status{
padding:4px 10px;
border-radius:999px;
font-size:10px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.4px;
display:inline-flex;
align-items:center;
gap:4px;
white-space:nowrap;
}

/* AKTIF */

.active{
background:#ffe4f0;
color:#e91e63;
border:1px solid #ffb6d2;
}

/* DONE */

.done{
background:#dcfce7;
color:#16a34a;
border:1px solid #86efac;
}

/* CANCEL */

.cancel{
background:#fee2e2;
color:#dc2626;
border:1px solid #fca5a5;
}

/* NOMOR */

.number-box{
display:flex;
align-items:center;
gap:8px;

background:#fff7fa;
border:1px solid #ffd6e6;
border-radius:12px;

padding:8px 10px;
margin-bottom:8px;
}

.number{
font-size:10px;
font-weight:400;
color:#222;
line-height:1.2;
letter-spacing:.2px;
word-break:break-all;
}

/* ROW */

.row{
display:flex;
justify-content:space-between;
align-items:center;

padding:6px 0;

border-bottom:1px dashed #ffd6e6;

font-size:12px;
}

.row:last-child{
border-bottom:none;
}

.label{
color:#888;
font-size:12px;
}

.value{
font-size:12px;
font-weight:600;
text-align:right;
}

/* SMS */

.sms-history{
margin-top:8px;

background:#fff7fa;
border:1px solid #ffd6e6;

border-radius:10px;

padding:10px;

font-size:12px;
line-height:1.5;
word-break:break-word;
}

.sms-title{
font-size:11px;
font-weight:700;
color:#e91e63;
margin-bottom:4px;
}

/* EMPTY */

.empty{
background:#fff;
padding:40px 20px;
border-radius:16px;
text-align:center;
color:#999;
box-shadow:0 3px 10px rgba(233,30,99,.06);
}

/* HEADER PAGE */

.header-top{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.back-btn{
width:40px;
height:40px;

border:none;
border-radius:12px;

background:#e91e63;
color:#fff;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

font-size:15px;

box-shadow:0 4px 12px rgba(233,30,99,.18);

transition:.2s;
}

.back-btn:hover{
transform:translateY(-1px);
}

.back-btn:active{
transform:scale(.95);
}

.title{
font-size:20px;
font-weight:700;
color:#e91e63;
margin:0;
}

/* SERVICE */

.history-service{
display:flex;
align-items:center;
gap:5px;
font-weight:600;
min-width:0;
}

.history-service span{
font-size:14px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* LOGO */

.history-app-logo{
width:18px;
height:18px;
object-fit:contain;
flex-shrink:0;
}

.history-country-logo{
width:15px;
height:11px;
object-fit:cover;
border-radius:2px;
flex-shrink:0;
}

.history-operator-logo{
width:18px;
height:18px;
object-fit:contain;
flex-shrink:0;
}

/* MOBILE */

@media(max-width:768px){

.history-card{
padding:10px;
}

.history-service span{
font-size:13px;
}

.number{
font-size:15px;
}

.status{
font-size:9px;
padding:3px 8px;
}

.row{
font-size:11px;
}

.label,
.value{
font-size:11px;
}

.title{
font-size:18px;
}

}

</style>
</head>
<body>

<div class="header-top">

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="title">
Riwayat OTP
</div>

</div>

<div class="search-box">

<i class="fas fa-search"></i>

<input
type="text"
id="searchInput"
placeholder="Cari nomor, aplikasi, OTP..."
>

</div>

<div id="historyContainer">

<div class="empty">
Loading...
</div>

</div>

<script src="riwayat-otp.js"></script>

</body>
</html>
