<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Riwayat OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff5f9;
padding:15px;
color:#333;
}

.title{
font-size:22px;
font-weight:700;
color:#e91e63;
margin-bottom:15px;
}

/* SEARCH */

.search-box{
position:relative;
margin-bottom:18px;
}

.search-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#e91e63;
font-size:14px;
}

.search-box input{
width:100%;
height:48px;
border:none;
outline:none;
padding:0 15px 0 42px;
border-radius:14px;
background:#fff;
box-shadow:
0 4px 12px rgba(233,30,99,.08);
font-size:14px;
}

/* CARD */

.history-card{
background:#fff;
border-radius:18px;
padding:16px;
margin-bottom:12px;
border:1px solid #ffd6e6;
box-shadow:
0 4px 15px rgba(233,30,99,.08);
}

/* HEADER */

.history-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.service-name{
font-size:15px;
font-weight:700;
color:#e91e63;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:999px;
font-size:11px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.5px;
display:inline-flex;
align-items:center;
gap:4px;
}

/* AKTIF - PINK */

.active{
background:#ffe4f0;
color:#e91e63;
border:1px solid #ffb6d2;
}

/* SELESAI - HIJAU */

.done{
background:#dcfce7;
color:#16a34a;
border:1px solid #86efac;
}

/* CANCEL - MERAH */

.cancel{
background:#fee2e2;
color:#dc2626;
border:1px solid #fca5a5;
}

/* NOMOR */

.number-box{
background:#fff7fa;
border:1px solid #ffd6e6;
border-radius:14px;
padding:12px;
margin-bottom:12px;
}

.number{
font-size:20px;
font-weight:700;
color:#222;
word-break:break-all;
}

/* ROW */

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px dashed #ffd6e6;
font-size:13px;
}

.row:last-child{
border-bottom:none;
}

.label{
color:#888;
}

.value{
font-weight:600;
}

/* SMS */

.sms-history{
margin-top:10px;
background:#fff7fa;
border:1px solid #ffd6e6;
border-radius:12px;
padding:12px;
font-size:13px;
line-height:1.6;
word-break:break-word;
}

.sms-title{
font-size:12px;
font-weight:700;
color:#e91e63;
margin-bottom:6px;
}

/* EMPTY */

.empty{
background:#fff;
padding:50px 20px;
border-radius:18px;
text-align:center;
color:#999;
box-shadow:
0 4px 15px rgba(233,30,99,.08);
}

/* HEADER */

.header-top{
display:flex;
align-items:center;
gap:12px;
margin-bottom:15px;
}

.back-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:#e91e63;
color:#fff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
box-shadow:
0 6px 16px rgba(233,30,99,.25);
transition:.2s;
}

.back-btn:hover{
transform:translateY(-2px);
}

.back-btn:active{
transform:scale(.95);
}

.title{
font-size:22px;
font-weight:700;
color:#e91e63;
margin:0;
}

</style>
</head>
<body>

<div class="header-top">

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div class="title">
Riwayat OTP
</div>

</div>

<div class="search-box">

<i class="fas fa-search"></i>

<input
type="text"
id="searchInput"
placeholder="Cari nomor, aplikasi, OTP..."
>

</div>

<div id="historyContainer">

<div class="empty">
Loading...
</div>

</div>

<script src="riwayat-otp.js"></script>

</body>
</html>
