<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeraPay</title>

<body>
<div class="header">
<div class="top">
<div class="logo">

<button
class="backBtn"
onclick="window.location.href='/home.html'">

<svg viewBox="0 0 24 24" width="18" height="18">
<path
d="M15 18L9 12L15 6"
fill="none"
stroke="white"
stroke-width="2.5"
stroke-linecap="round"
stroke-linejoin="round"/>
</svg>

</button>

Setor Akun

</div>
<div class="user">

<div
class="avatar"
id="avatar">
<img src="/css/img/avatar1.png">
</div>

<div>

<div id="namaUser">
Loading...
</div>

<div class="reward">
Rp <span id="saldo">0</span>
</div>

</div>

</div>
</div>
</div>
</div>
<div class="wrap">
<div id="home" class="page activePage">
<div class="card">
<div class="title">
Setoran Akun
</div>
<label class="label">
Pilih Tipe
</label>
<select
id="tipeSelect"
class="input"
onchange="pilihTipe()">
<option value="Facebook Fresh|1000">
Setor Facebook Fresh Rp: 1000
</option>
<option value="Gmail Fresh|3000">
Setor Gmail Fresh Rp: 3000
</option>
<option value="Gmail Bekas|1250">
Setor Gmail Bekas Rp: 1250
</option>
</select>
Password
</label>
<input
id="password"
class="input"
placeholder="Password">
<label class="label">
Email (pisahkan dengan enter)
</label>

<textarea
id="raw"
class="textarea"
placeholder="paste data disini"
oninput="previewNomor()">
</textarea>

<div
id="previewRaw"
style="
margin-top:10px;
background:#fff1f6;
padding:12px;
border-radius:15px;
font-size:12px;
line-height:1.7;
white-space:pre-wrap;
color:#666;
max-height:200px;
overflow:auto;
display:none">
</div>

<button
id="kirimBtn"
class="btn"
onclick="kirim()">

<span id="btnText">
KIRIM
</span>

</button>

<div class="rulesLink">
<a href="/setoran/rules-syarat-ketentuan-setoran">
Lihat Rules Syarat & Ketentuan Setor Akun
</a>
</div>

</div>
</div>

<div id="withdraw" class="page">
<div class="card">
<div class="title">
Withdrawl
</div>
<div id="rekeningForm">
<label class="label">
Bank / E-Wallet
</label>
<select
id="bank"
class="input">
<option value="">
Pilih Bank
</option>
<option>DANA</option>
<option>GOPAY</option>
<option>SEABANK</option>
<option>SHOPEEPAY</option>
<option>OVO</option>
<option>BRI</option>
<option>MANDIRI</option>
</select>
<label class="label">
Nomor Rekening
</label>
<input
id="norek"
class="input"
placeholder="Masukkan nomor rekening">
<label class="label">
Nama Rekening
</label>
<input
id="namaRek"
class="input"
placeholder="Nama pemilik rekening">
<button
id="saveBtn"
class="btn"
onclick="saveRekening()">
Simpan Rekening
</button>
</div>
<div
id="withdrawArea"
style="display:none">
<div class="total">
<div style="
display:flex;
justify-content:space-between;
margin-bottom:12px">
<span>Bank</span>
<b id="showBank">
-
</b>
</div>
<div style="
display:flex;
justify-content:space-between;
margin-bottom:12px">
<span>Nomor Rekening</span>
<b id="showNorek">
-
</b>
</div>
<div style="
display:flex;
justify-content:space-between">
<span>Nama Rekening</span>
<b id="showNama">
-
</b>
</div>
</div>
<label class="label">
Nominal Penarikan
</label>

<input
id="nominal"
class="input"
placeholder="Rp 0">

<div
class="ambilSemua"
onclick="isiSemuaSaldo()">
Tarik semua
</div>

<button
class="btn"
onclick="kirimWithdraw()">
KIRIM
</button>
<div
class="card"
style="margin-top:20px">
<div class="title">
Riwayat Penarikan
</div>
<table>
<thead>
<tr>
<th>
Jumlah
</th>
<th>
Status
</th>
</tr>
</thead>
<tbody id="withdrawHistory">
<tr id="emptyWithdraw">
<td
colspan="2"
style="
text-align:center;
padding:20px;
color:#999">
Belum ada riwayat penarikan
</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</div>

<div id="history" class="page">
<div class="card">

<div class="title">
Riwayat
</div>

<div class="total" id="total">
Total Akun : 0
</div>

<input
class="search"
placeholder="Cari..."
onkeyup="cari(this.value)">

<div class="tableWrap">

<table>

<thead>
<tr>
<th>Email</th>
<th>UID</th>
<th>Password</th>
<th>Status</th>
<th>Tipe</th>
</tr>
</thead>

<tbody id="hasil"></tbody>

</table>

</div>

</div>
</div>

<div class="bottom">

<svg viewBox="0 0 15 15" fill="none">
